<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>QueueIQ - Your Turn Alert</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#152f4c", // Navy
                        "accent": "#FFD700",  // Gold
                        "teal-custom": "#14b8a6", // Teal
                        "background-light": "#f6f7f8",
                        "background-dark": "#13191f",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .confetti-overlay {
            background-image: radial-gradient(circle, #FFD700 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.15;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="font-display bg-primary min-h-screen relative overflow-hidden flex flex-col items-center justify-between">
    <!-- Subtle Gold Confetti Background Layer -->
    <div class="absolute inset-0 confetti-overlay pointer-events-none"></div>
    <!-- Top AppBar -->
    <div class="relative z-10 w-full flex items-center p-4 justify-between">
        <button onclick="history.back()" class="text-white/80 hover:text-white transition-colors">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-8">Queue Alert
        </h2>
    </div>
    <!-- Main Content -->
    <main class="relative z-10 flex-1 flex flex-col items-center justify-center w-full px-6 py-8 text-center">
        <!-- Bell Icon Section -->
        <div class="relative mb-8">
            <div class="absolute inset-0 bg-accent/20 rounded-full blur-3xl scale-150"></div>
            <div
                class="relative flex items-center justify-center size-32 bg-accent rounded-full text-primary shadow-[0_0_50px_rgba(255,215,0,0.4)]">
                <span class="material-symbols-outlined text-7xl"
                    style="font-variation-settings: 'FILL' 1">notifications_active</span>
            </div>
        </div>
        <!-- Headline -->
        <h1 class="text-white text-4xl font-bold leading-tight mb-2">Your Turn is Coming!</h1>
        <p id="turn-dept" class="text-accent text-xl font-medium mb-10">Please proceed to Counter 3 - OPD General</p>
        <!-- Token Card -->
        <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-8 w-full max-w-sm mb-8">
            <p class="text-white/60 text-sm font-bold uppercase tracking-widest mb-2">Current Position</p>
            <h2 id="turn-token" class="text-white text-6xl font-black mb-4">Token --</h2>
            <div class="h-[1px] bg-white/20 w-full mb-6"></div>
            <div class="flex items-center justify-center gap-2 text-white/90">
                <span class="material-symbols-outlined text-accent">schedule</span>
                <p class="text-sm font-medium">Doctor will call you in approximately <span id="turn-time"
                        class="text-accent">-- minutes</span></p>
            </div>
        </div>
    </main>
    <!-- Bottom Actions -->
    <footer class="relative z-10 w-full p-6 space-y-4 mb-4">
    <!-- Bottom Nav -->
    <nav class="border-t border-primary/10 bg-white dark:bg-background-dark pb-6 pt-2 sticky bottom-0 z-50">
        <div class="flex justify-around">
            <a class="flex flex-col items-center gap-1 text-slate-400" href="index.html">
                <span class="material-symbols-outlined">home</span>
                <span class="text-[10px] font-bold uppercase">Home</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-accent-gold" href="Token_Registration_Welcome.html">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">confirmation_number</span>
                <span class="text-[10px] font-bold uppercase">Token</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="Your_Health_Brief.html">
                <span class="material-symbols-outlined">lightbulb</span>
                <span class="text-[10px] font-bold uppercase">Insights</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="WhatsApp_Integration.html">
                <span class="material-symbols-outlined">chat</span>
                <span class="text-[10px] font-bold uppercase">Support</span>
            </a>
        </div>
    </nav>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tk = localStorage.getItem('queueiq_token_number') || 'TK-0047';
            if (tk) {
                document.getElementById('turn-token').textContent = 'Token ' + tk.split('-').pop();
            }

            const dept = localStorage.getItem('queueiq_department') || 'OPD General';
            const deptEl = document.getElementById('turn-dept');
            if (deptEl) deptEl.textContent = `Please proceed to ${dept} - Room 3`;

            const wait = localStorage.getItem('queueiq_wait_time') || '5';
            const timeEl = document.getElementById('turn-time');
            if (timeEl) timeEl.textContent = `${wait} minutes`;
        });
    </script>
</body>

</html>
