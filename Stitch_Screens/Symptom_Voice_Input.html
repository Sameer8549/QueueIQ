<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#152f4c",
                        "accent-gold": "#d4af37",
                        "accent-teal": "#0d9488",
                        "background-light": "#f6f7f8",
                        "background-dark": "#13191f",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>QueueIQ - Symptom Voice Input</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="sticky top-0 z-10 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 p-4">
<div class="flex items-center justify-between max-w-md mx-auto w-full">
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined block">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Symptom Input</h1>
<div class="w-10"></div>
</div>
</header>
<main class="flex-1 flex flex-col items-center px-6 py-8 max-w-md mx-auto w-full">
<div class="mb-8">
<div class="inline-flex items-center gap-2 bg-primary/10 dark:bg-primary/30 px-4 py-2 rounded-full border border-primary/20">
<span class="text-sm font-medium">🇮🇳 Kannada</span>
<span class="material-symbols-outlined text-sm">expand_more</span>
</div>
</div>
<div class="text-center mb-12">
<h2 class="text-2xl font-bold mb-2">Speak in your language</h2>
<p class="text-slate-500 dark:text-slate-400">Describe how you're feeling...</p>
</div>
<div class="relative flex items-center justify-center mb-12">
<div class="absolute w-40 h-40 rounded-full bg-accent-gold/20 scale-125"></div>
<div class="absolute w-32 h-32 rounded-full bg-accent-gold/40 scale-110"></div>
<button class="relative z-10 w-24 h-24 rounded-full bg-primary flex items-center justify-center shadow-xl shadow-primary/30">
<span class="material-symbols-outlined text-white text-5xl">mic</span>
</button>
</div>
<div class="flex items-end justify-center gap-1 h-12 mb-10">
<div class="w-1 bg-accent-gold h-4 rounded-full"></div>
<div class="w-1 bg-accent-gold h-8 rounded-full"></div>
<div class="w-1 bg-accent-gold h-12 rounded-full"></div>
<div class="w-1 bg-accent-gold h-6 rounded-full"></div>
<div class="w-1 bg-accent-gold h-10 rounded-full"></div>
<div class="w-1 bg-accent-gold h-5 rounded-full"></div>
<div class="w-1 bg-accent-gold h-9 rounded-full"></div>
</div>
<div class="w-full bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm mb-8">
<div class="flex items-center gap-2 mb-3">
<span class="material-symbols-outlined text-primary text-sm">transcribe</span>
<span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Live Transcription</span>
</div>
<p class="text-lg font-medium leading-relaxed">"Fever and headache for 3 days"</p>
</div>
<div class="w-full space-y-4">
<button class="w-full py-4 bg-accent-teal hover:bg-teal-700 text-white font-bold rounded-xl transition-colors shadow-lg shadow-teal-900/10">
                Yes, that's correct
            </button>
<button class="w-full py-4 bg-transparent border-2 border-slate-300 dark:border-slate-600 font-bold rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                Record again
            </button>
</div>
<div class="mt-10 mb-4 text-center">
<button class="text-primary dark:text-blue-400 font-medium hover:underline flex items-center gap-1 mx-auto">
<span class="material-symbols-outlined text-base">keyboard</span>
                Or type your symptoms here
            </button>
</div>
</main>
<nav class="sticky bottom-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-4 py-2">
<div class="flex justify-between items-center max-w-md mx-auto">
<a class="flex flex-col items-center p-2 text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] mt-1 font-medium">Home</span>
</a>
<a class="flex flex-col items-center p-2 text-primary" href="#">
<span class="material-symbols-outlined fill-1">medical_services</span>
<span class="text-[10px] mt-1 font-medium">Health</span>
</a>
<a class="flex flex-col items-center p-2 text-slate-400" href="#">
<span class="material-symbols-outlined">chat_bubble</span>
<span class="text-[10px] mt-1 font-medium">Consult</span>
</a>
<a class="flex flex-col items-center p-2 text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] mt-1 font-medium">Profile</span>
</a>
</div>
</nav>
</body></html>
